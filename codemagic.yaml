workflows:
  android-workflow:
    name: Android APK Build

    environment:
      flutter: 3.41.7
      java: 17

    scripts:
      - name: Initialize Android & Flutter Environment
        script: |
          # 1. Ép hệ thống chấp nhận các điều khoản của Android SDK trước
          yes | sdkmanager --licenses || true
          
          # 2. Chạy Flutter Doctor trực tiếp từ hệ thống Codemagic để kích hoạt môi trường
          flutter doctor --android-licenses
          flutter doctor

      - name: Install Flet Dependencies
        script: |
          python3 -m pip install --upgrade pip
          pip install flet flet-cli uvicorn requests pillow

      - name: Build APK
        script: |
          # 3. Sử dụng lệnh build thuần túy sau khi môi trường đã được thông suốt
          flet build apk --yes
          
    artifacts:
      - build/**/outputs/**/*.apk
