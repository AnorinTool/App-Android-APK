workflows:
  android-workflow:
    name: Android APK Build

    environment:
      flutter: 3.41.7

    scripts:
      - name: Install Flet Dependencies
        script: |
          python3 -m pip install --upgrade pip
          pip install flet flet-cli uvicorn requests pillow

      - name: Build APK
        script: |
          # Bổ sung thêm cờ --no-cache để ép hệ thống xóa bỏ bản dịch lỗi cũ
          flet build apk --yes --no-cache

    artifacts:
      - build/**/outputs/**/*.apk
