workflows:
  android-workflow:
    name: Android APK Build

    environment:
      java: 17

    scripts:
      - name: Install Dependencies
        script: |
          python3 -m pip install --upgrade pip
          pip install flet==0.28.3 flet-cli

      - name: Build APK
        script: |
          yes | flet build apk --verbose

    artifacts:
      - build/**/outputs/**/*.apk