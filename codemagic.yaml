workflows:
  android-workflow:
    name: Android APK Build

    environment:
      flutter: stable
      java: 17

    scripts:
      - name: Install Dependencies
        script: |
          python3 -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install flet-cli

      - name: Doctor Check
        script: |
          flet doctor

      - name: Build APK
        script: |
          flet build apk --verbose

    artifacts:
      - build/**/outputs/**/*.apk