workflows:
  android-workflow:
    name: Android APK Build

    environment:
      # 1. Chỉ định chính xác phiên bản Flutter SDK mà Flet yêu cầu
      flutter: 3.41.7
      # 2. Sử dụng Java 17 (Cú pháp chuẩn được Codemagic chấp nhận)
      java: 17

    scripts:
      - name: Install Flet Dependencies
        script: |
          python3 -m pip install --upgrade pip
          pip install flet flet-cli uvicorn requests pillow

      - name: Build APK
        script: |
          # 3. Thực thi lệnh build với cờ xác nhận tự động
          flet build apk --yes

    artifacts:
      - build/**/outputs/**/*.apk
