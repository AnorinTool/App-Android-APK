workflows:
  android-workflow:
    name: Android APK Build

    environment:
      # 1. Khai báo chính xác phiên bản Flutter SDK
      flutter: 3.41.7
      # 2. Ép hệ thống sử dụng Java 17 (Tiêu chuẩn bắt buộc cho các bản Flutter/Flet mới)
      java: 17
      # 3. Chỉ định phiên bản Android SDK cần thiết để biên dịch ổn định
      android_gradle: 8.0.2

    scripts:
      - name: Install Flet Dependencies
        script: |
          python3 -m pip install --upgrade pip
          pip install flet flet-cli uvicorn requests pillow

      - name: Build APK
        script: |
          # Chạy lệnh build chuẩn hóa với cờ tự động chấp thuận
          flet build apk --yes

    artifacts:
      - build/**/outputs/**/*.apk
