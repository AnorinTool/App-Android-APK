workflows:
  android-workflow:
    name: Android APK Build

    environment:
      # Duy trì phiên bản Flutter SDK chính xác để tránh xung đột
      flutter: 3.41.7

    scripts:
      - name: Install Flet Dependencies
        script: |
          python3 -m pip install --upgrade pip
          pip install flet flet-cli uvicorn requests pillow

      - name: Build APK
        script: |
          # CHỈ ĐỊNH CHUẨN: Loại bỏ hoàn toàn --no-cache, giữ lại cờ tự động --yes
          flet build apk --yes
          
    artifacts:
      - build/**/outputs/**/*.apk
