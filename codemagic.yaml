workflows:
  android-workflow:
    name: Android APK Build

    environment:
      flutter: 3.41.7
      java: 17

    scripts:
      - name: Install Dependencies
        script: |
          python3 -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install flet-cli

      - name: Build APK
        script: |
          flet build apk --yes --verbose

    artifacts:
      - build/**/outputs/**/*.apk